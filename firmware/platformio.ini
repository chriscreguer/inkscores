; InkScores firmware for the Seeed Studio reTerminal E1002
; 7.3" 800x480 color ePaper, ESP32-S3, 8 MB PSRAM, 32 MB flash.
;
; Flow: wake -> Wi-Fi -> HTTPS GET dashboard JSON -> parse -> render -> deep sleep.

[env:reterminal_e1002]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino

; The reTerminal E1002 has 8 MB PSRAM and 32 MB flash. Adjust the board/upload
; settings to match your exact module if you flash a different variant.
board_build.flash_mode = qio
board_build.psram_type = opi
board_upload.flash_size = 32MB
board_build.partitions = default_16MB.csv
build_flags =
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=3

monitor_speed = 115200
upload_speed = 115200

lib_deps =
    bblanchon/ArduinoJson @ ^7.1.0
    ; ePaper driver. GxEPD2 supports the 7.3" 6-colour (Spectra/E6) panel used
    ; by the reTerminal E1002. If you use Seeed's own display library instead,
    ; swap the panel binding in src/render_dashboard.cpp accordingly.
    zinggjm/GxEPD2 @ ^1.6.2
